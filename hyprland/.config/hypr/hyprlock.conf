# this config is entirely generated by claude
# i had nearly zero involvment in doing that

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Clock ────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(abb2bfff)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 1
    shadow_color = rgba(00000088)
    shadow_size = 10
}

# ── Date ────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(5c6370ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# ── Password input ───────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(3e4451ff)
    inner_color = rgba(2c323cff)
    font_color = rgba(abb2bfff)

    # state colors
    check_color = rgba(98c379ff)
    fail_color = rgba(e06c75ff)

    placeholder_text = <span foreground="##5c6370"> 󰌾  Enter password</span>
    fail_text = <span foreground="##e06c75">$ATTEMPTS  incorrect</span>

    font_family = JetBrainsMono Nerd Font
    font_size = 14

    rounding = 10
    position = 0, -220
    halign = center
    valign = center

    shadow_passes = 1
    shadow_color = rgba(00000066)
    shadow_size = 6
}

# ── Hint label ───────────────────────────────────────────────────
label {
    monitor =
    text = 󰍁  $USER
    color = rgba(5c6370ff)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -280
    halign = center
    valign = center
}

# ── Input language ───────────────────────────────────────────────
label {
    monitor =
    text = $LAYOUT[en,ge]
    color = rgba(61afefff)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    onclick = hyprctl switchxkblayout all next
    position = 0, -310
    halign = center
    valign = center
}
