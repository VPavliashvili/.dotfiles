monitor=DP-2, 2560x1440@165.00, 0x270, 1
monitor=DP-4, 1920x1080@165.00, 2560x0, 1, transform, 3

workspace = 1,monitor:DP-2
workspace = 2,monitor:DP-2
workspace = 3,monitor:DP-2
workspace = 4,monitor:DP-2
workspace = 5,monitor:DP-2
workspace = 6,monitor:DP-2
workspace = 7,monitor:DP-4
workspace = 8,monitor:DP-2
workspace = 9,monitor:DP-2
workspace = 10,monitor:DP-2

exec = ~/.config/hypr/mouse_sensitivity.sh -0.25

bind = $mainMod SHIFT, V, submap, vms
submap = vms
bind = ,0,exec,~/.config/hypr/run_vm.sh -n win10_gaming -g 1 -w 10 -a "-f /dev/shm/win10_gaming audio:micDefault=allow -c 127.0.0.1 -p 5905" -f
bind = ,0,submap,reset
bind = ,6,exec,~/.config/hypr/run_vm.sh -n win10_work -g 1 -w 6 -a "-f /dev/shm/win10_work audio:micDefault=allow -c 127.0.0.1 -p 5906" -f
bind = ,6,submap,reset
bind = ,escape,submap,reset
submap = reset
